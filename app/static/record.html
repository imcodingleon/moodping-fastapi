<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodPing - 감정 기록</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container waterfall-container">
        <header>
            <h2>오늘의 기분은? 🌙</h2>
        </header>

        <!-- Section 1: 이모지 선택 (항상 활성) -->
        <section id="section-emoji" class="active-section">
            <h3>어떤 감정인가요?</h3>
            <div class="emoji-grid">
                <div class="emoji-btn" data-label="happy"     title="기쁨">😊</div>
                <div class="emoji-btn" data-label="excited"   title="신남">😄</div>
                <div class="emoji-btn" data-label="thrilled"  title="설렘">😍</div>
                <div class="emoji-btn" data-label="love"      title="사랑">🥰</div>
                <div class="emoji-btn" data-label="confident" title="자신감">😎</div>
                <div class="emoji-btn" data-label="calm"      title="평온">😌</div>
                <div class="emoji-btn" data-label="numb"      title="무감각">😐</div>
                <div class="emoji-btn" data-label="tired"     title="피곤">😴</div>
                <div class="emoji-btn" data-label="gloomy"    title="우울">😔</div>
                <div class="emoji-btn" data-label="sad"       title="슬픔">😢</div>
                <div class="emoji-btn" data-label="tearful"   title="눈물">😭</div>
                <div class="emoji-btn" data-label="annoyed"   title="짜증">😤</div>
                <div class="emoji-btn" data-label="angry"     title="분노">😡</div>
                <div class="emoji-btn" data-label="anxious"   title="불안">😰</div>
                <div class="emoji-btn" data-label="scared"    title="두려움">😨</div>
            </div>
        </section>

        <!-- Section 2: 강도 선택 (슬라이더) -->
        <section id="section-intensity" class="disabled-section">
            <h3>얼마나 강하게 느껴지나요?</h3>
            <div class="slider-wrapper">
                <div class="slider-labels">
                    <span>전혀 없음</span>
                    <span id="slider-value-display" class="slider-value">5</span>
                    <span>매우 강함</span>
                </div>
                <input type="range" id="intensity-slider" min="0" max="10" value="5" step="1">
                <div class="slider-ticks">
                    <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
                    <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
                </div>
            </div>
            <button id="intensity-confirm-btn" class="btn-intensity-confirm">이 강도로 선택</button>
        </section>

        <!-- Section 3: 메모 & 저장 -->
        <section id="section-note" class="disabled-section">
            <h3>하고 싶은 말이 있나요? <span style="font-size:14px;font-weight:normal;color:#999">(선택)</span></h3>
            <textarea id="note-input" rows="3" maxlength="500"
                      placeholder="짧게 남겨주셔도 좋아요. (최대 500자)"></textarea>
            <button id="submit-btn" class="btn-primary">AI 마음 분석받기 ✨</button>
        </section>

        <!-- Section 4: 분석 결과 -->
        <section id="section-result">
            <div class="result-card">
                <div class="loading-spinner" id="loading-spinner">
                    <div class="spinner"></div>
                    <p>AI가 마음을 읽고 있습니다...</p>
                </div>
                <div id="result-content" style="display: none;">
                    <h3>AI의 마음 편지 💌</h3>
                    <p id="feedback-text" style="line-height:1.8;color:#2c3e50"></p>
                    <button id="confirm-btn" class="btn-secondary">확인 완료</button>
                </div>
            </div>
        </section>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/record.js"></script>
</body>
</html>
